# ========== SERVER ==========
# Cloud platforms assign a dynamic port via the PORT environment variable
server.port=${PORT:8080}

# ========== MONGODB ==========
# Reads the cloud MongoDB Atlas URI safely from environment variables
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI}
spring.data.mongodb.auto-index-creation=true

# ========== JWT ==========
jwt.secret=${JWT_SECRET:interview-copilot-super-secret-production-key-minimum-32-characters-safe-and-long-12345}
jwt.expiration=86400000

# ========== FILE UPLOAD ==========
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ========== LOGGING ==========
logging.level.root=INFO
logging.level.com.interviewcopilot=INFO

# ========== SWAGGER ==========
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# ========== GEMINI ==========
gemini.api.key=${GEMINI_API_KEY:placeholder}
gemini.model=${GEMINI_MODEL:gemini-1.5-flash}
